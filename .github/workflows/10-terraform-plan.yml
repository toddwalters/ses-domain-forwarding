name: 10-terraform-plan

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  plan-prd:
    runs-on: ubuntu-latest
    environment: prd
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: lambda/ses-email-forwarder/package-lock.json

      - name: Build Lambda package
        working-directory: lambda/ses-email-forwarder
        run: |
          set -euo pipefail
          npm ci --ignore-scripts
          npm test
          npm run build

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: 1.14.8

      - name: Assume target provisioner role
        uses: aws-actions/configure-aws-credentials@796449b3e38e3c256861227399e58b780e0e5538 # v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_TARGET_ACCOUNT_ID }}:role/${{ vars.TARGET_ROLE_NAME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform plan
        working-directory: terraform/envs/prd
        env:
          AWS_REGION_VAR: ${{ vars.AWS_REGION }}
          AWS_TARGET_ACCOUNT_ID_VAR: ${{ vars.AWS_TARGET_ACCOUNT_ID }}
          AWS_SOURCE_ACCOUNT_ID_VAR: ${{ vars.AWS_SOURCE_ACCOUNT_ID }}
          TF_STATE_BUCKET_VAR: ${{ vars.TF_STATE_BUCKET }}
          TF_STATE_PREFIX_VAR: ${{ vars.TF_STATE_PREFIX }}
          SOURCE_DNS_ROLE_NAME_VAR: ${{ vars.SOURCE_DNS_ROLE_NAME }}
          SOURCE_HOSTED_ZONE_ID_VAR: ${{ vars.SOURCE_HOSTED_ZONE_ID }}
          PRD_TFVARS: ${{ secrets.PRD_TFVARS }}
        run: |
          set -euo pipefail

          : "${AWS_REGION_VAR:?Missing required variable AWS_REGION}"
          : "${AWS_TARGET_ACCOUNT_ID_VAR:?Missing required variable AWS_TARGET_ACCOUNT_ID}"
          : "${TF_STATE_BUCKET_VAR:?Missing required variable TF_STATE_BUCKET}"
          : "${TF_STATE_PREFIX_VAR:?Missing required variable TF_STATE_PREFIX}"
          : "${PRD_TFVARS:?Missing required secret PRD_TFVARS}"

          TFVARS_FILE="$RUNNER_TEMP/prd.tfvars"
          printf '%s\n' "$PRD_TFVARS" > "$TFVARS_FILE"
          chmod 600 "$TFVARS_FILE"

          terraform init -input=false \
            -backend-config="bucket=${TF_STATE_BUCKET_VAR}" \
            -backend-config="key=${TF_STATE_PREFIX_VAR}/envs/prd.tfstate" \
            -backend-config="region=${AWS_REGION_VAR}" \
            -backend-config="use_lockfile=true" \
            -backend-config="encrypt=true"

          terraform validate

          PLAN_FILE="$RUNNER_TEMP/prd.tfplan"
          PLAN_TEXT="$RUNNER_TEMP/prd-plan.txt"
          PLAN_JSON="$RUNNER_TEMP/prd-plan.json"

          plan_args=(
            -input=false
            -out "$PLAN_FILE"
            -var-file="$TFVARS_FILE"
            -var "target_account_id=${AWS_TARGET_ACCOUNT_ID_VAR}"
            -var "primary_region=${AWS_REGION_VAR}"
            -var "activate_receipt_rule_set=true"
          )

          if [ -n "$AWS_SOURCE_ACCOUNT_ID_VAR" ]; then
            plan_args+=( -var "source_account_id=${AWS_SOURCE_ACCOUNT_ID_VAR}" )
          fi
          if [ -n "$SOURCE_HOSTED_ZONE_ID_VAR" ]; then
            plan_args+=( -var "source_authoritative_zone_id=${SOURCE_HOSTED_ZONE_ID_VAR}" )
          fi
          if [ -n "$SOURCE_DNS_ROLE_NAME_VAR" ]; then
            : "${AWS_SOURCE_ACCOUNT_ID_VAR:?AWS_SOURCE_ACCOUNT_ID is required when SOURCE_DNS_ROLE_NAME is set}"
            plan_args+=( -var "source_dns_role_arn=arn:aws:iam::${AWS_SOURCE_ACCOUNT_ID_VAR}:role/${SOURCE_DNS_ROLE_NAME_VAR}" )
          fi

          terraform plan "${plan_args[@]}"

          terraform show -no-color "$PLAN_FILE" > "$PLAN_TEXT"
          terraform show -json "$PLAN_FILE" > "$PLAN_JSON"

          {
            echo "## Terraform Plan"
            echo ""
            echo "- Target account: \`${AWS_TARGET_ACCOUNT_ID_VAR}\`"
            echo "- Source DNS account: \`${AWS_SOURCE_ACCOUNT_ID_VAR:-not configured}\`"
            echo "- Receipt rule set activation: \`true\`"
            echo "- Plan artifact: \`prd-tfplan\`"
          } >> "$GITHUB_STEP_SUMMARY"

          python3 ../../../scripts/render_domain_plan_summary.py "$PLAN_JSON"

      - name: Upload Terraform plan
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: prd-tfplan
          path: |
            ${{ runner.temp }}/prd.tfplan
            ${{ runner.temp }}/prd-plan.txt
            ${{ runner.temp }}/prd-plan.json
